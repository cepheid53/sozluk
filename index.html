<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cepheid Scans - SFX Sözlüğü</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #2b2b36;
            --text-color: #f5f5f5;
            --accent-color: #4da6ff;
            --border-color: #3f3f4e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-container {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
        }
        h1 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
        }
        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        /* Yan Menü (Harfler) */
        .sidebar {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            min-width: 150px;
            height: fit-content;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .sidebar h3 {
            margin-top: 0;
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .letter-btn {
            display: block;
            width: 100%;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-size: 16px;
            font-weight: bold;
        }
        .letter-btn:hover, .letter-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }
        /* Tablo Alanı */
        .content {
            flex-grow: 1;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #3f3f4e;
            color: white;
        }
        .search-box:focus {
            outline: 2px solid var(--accent-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--bg-color);
            color: var(--accent-color);
            position: sticky;
            top: 0;
        }
        tr:hover {
            background-color: #353544;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--accent-color);
        }
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                justify-content: center;
            }
            .letter-btn {
                width: auto;
                min-width: 40px;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>Cepheid Scans - SFX Sözlüğü</h1>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>Sözlük</h3>
        <button class="letter-btn active" onclick="filterByLetter('Hepsi')">Tüm Liste</button>
        <div id="letterContainer">
            </div>
    </div>

    <div class="content">
        <input type="text" id="searchInput" class="search-box" placeholder="Japonca, Romaji veya Türkçe anlamında ara...">
        
        <table>
            <thead>
                <tr>
                    <th>Japonca</th>
                    <th>Romaji</th>
                    <th>Türkçe Anlamı</th>
                    <th>Açıklama / Notlar</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="loading">Veritabanı okunuyor... Lütfen bekleyin.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvI9TzWNvNo1xMHE1t8lmeY8Ma6gsVxA0pftYke_tw7nOykjkQLypp1AjOl2iaN000i2dpvquzgRhX/pub?gid=0&single=true&output=csv";

    let allData = []; 

    // Kelimenin içindeki ilk Japonca karakteri (Hiragana/Katakana) bulan fonksiyon
    function getFirstKana(str) {
        let match = str.match(/[ぁ-んァ-ン]/);
        return match ? match[0] : '';
    }

    Papa.parse(csvUrl, {
        download: true,
        header: false, 
        complete: function(results) {
            let rows = results.data;
            rows.shift(); 

            allData = rows.map(row => ({
                japanese: row[0] ? row[0].trim() : '',
                romaji: row[1] ? row[1].trim() : '',
                turkish: row[2] ? row[2].trim() : '',
                explanation: row[3] ? row[3].trim() : ''
            })).filter(item => item.romaji !== '' || item.japanese !== '');

            // Artık tabloyu Japonca Gojūon sırasına (A, I, U, E, O, Ka, Ki...) göre sıralıyoruz
            allData.sort((a, b) => a.japanese.localeCompare(b.japanese, 'ja'));

            createLetterButtons();
            renderTable(allData);
        },
        error: function() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="loading" style="color:red;">Veritabanına bağlanılamadı. Linki kontrol edin.</td></tr>';
        }
    });

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#aaa;">Sonuç bulunamadı.</td></tr>';
            return;
        }

        data.forEach(item => {
            let formattedTurkish = item.turkish.replace(/(\(\d+\))/g, '<br><span style="color:var(--accent-color);">$1</span>').replace(/^<br>/, '');
            let formattedExp = item.explanation.replace(/(\(\d+\))/g, '<br><span style="color:var(--accent-color);">$1</span>').replace(/^<br>/, '');

            tbody.innerHTML += `
                <tr>
                    <td style="font-size: 1.2em; font-weight: bold;">${item.japanese}</td>
                    <td>${item.romaji}</td>
                    <td>${formattedTurkish}</td>
                    <td style="font-size: 0.9em; color: #ccc;">${formattedExp}</td>
                </tr>
            `;
        });
    }

    function createLetterButtons() {
        const container = document.getElementById('letterContainer');
        
        // İlk Japonca karakteri al ve tekrarları sil
        let letters = [...new Set(allData.map(item => getFirstKana(item.japanese)))].filter(l => l !== '');
        
        // Japonca alfabe sırasına göre diz
        letters.sort((a, b) => a.localeCompare(b, 'ja')); 

        letters.forEach(letter => {
            let btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.innerText = letter; // Artık butonun üstünde Japonca harf yazacak
            btn.onclick = () => filterByLetter(letter, btn);
            container.appendChild(btn);
        });
    }

    function filterByLetter(letter, btnElement = null) {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) {
            btnElement.classList.add('active');
        } else {
            document.querySelector('.sidebar button').classList.add('active'); 
        }

        document.getElementById('searchInput').value = '';

        if (letter === 'Hepsi') {
            renderTable(allData);
        } else {
            // Sadece başındaki Japonca karakteri uyanları filtrele
            let filtered = allData.filter(item => getFirstKana(item.japanese) === letter);
            renderTable(filtered);
        }
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.sidebar button').classList.add('active');

        const term = this.value.toLowerCase();
        let filtered = allData.filter(item => 
            item.japanese.toLowerCase().includes(term) ||
            item.romaji.toLowerCase().includes(term) ||
            item.turkish.toLowerCase().includes(term) ||
            item.explanation.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });
</script>
</body>
</html>
