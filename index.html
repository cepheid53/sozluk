<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cepheid Scans - SFX Sözlüğü</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #2b2b36;
            --text-color: #f5f5f5;
            --accent-color: #4da6ff;
            --border-color: #3f3f4e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-container {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
        }
        h1 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
        }
        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .sidebar {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            min-width: 180px;
            height: fit-content;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .sidebar h3 {
            margin-top: 0;
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .letter-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 5px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-size: 14px;
            font-weight: bold;
        }
        .letter-btn:hover, .letter-btn.active {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }
        .full-list-btn {
            grid-column: span 3;
            margin-bottom: 10px;
        }
        .content {
            flex-grow: 1;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            overflow-x: auto;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #3f3f4e;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--bg-color);
            color: var(--accent-color);
            position: sticky;
            top: 0;
        }
        tr:hover {
            background-color: #353544;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--accent-color);
        }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { max-height: none; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>Cepheid Scans - SFX Sözlüğü</h1>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>Kanalara Göre</h3>
        <div class="letter-grid">
            <button class="letter-btn active full-list-btn" onclick="filterByLetter('Hepsi')">Tüm Liste</button>
            <div id="letterContainer" style="display: contents;">
                </div>
        </div>
    </div>

    <div class="content">
        <input type="text" id="searchInput" class="search-box" placeholder="Hızlı ara (Japonca, Romaji, Türkçe)...">
        <table>
            <thead>
                <tr>
                    <th>Japonca</th>
                    <th>Romaji</th>
                    <th>Türkçe Anlamı</th>
                    <th>Açıklama</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="loading">Veritabanı yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvI9TzWNvNo1xMHE1t8lmeY8Ma6gsVxA0pftYke_tw7nOykjkQLypp1AjOl2iaN000i2dpvquzgRhX/pub?gid=0&single=true&output=csv";
    
    // Senin gönderdiğin Katakana listesi
    const katakanaList = ["ア","イ","ウ","エ","オ","カ","キ","ク","ケ","コ","サ","シ","ス","セ","ソ","タ","チ","ツ","テ","ト","ナ","ニ","ヌ","ネ","ノ","ハ","ヒ","フ","ヘ","ホ","マ","ミ","ム","メ","モ","ヤ","ユ","ヨ","ラ","リ","ル","レ","ロ","ワ","ヲ","ン"];
    
    let allData = [];

    // Kelimenin ilk Japonca karakterini temizleyen fonksiyon
    function getCleanFirstChar(str) {
        let char = str.trim().charAt(0);
        // Dakuten/Handakuten temizleme (ガ -> カ, パ -> ハ gibi)
        return char.normalize('NFD').charAt(0);
    }

    Papa.parse(csvUrl, {
        download: true,
        header: false,
        complete: function(results) {
            let rows = results.data;
            rows.shift(); 

            allData = rows.map(row => ({
                japanese: row[0] ? row[0].trim() : '',
                romaji: row[1] ? row[1].trim() : '',
                turkish: row[2] ? row[2].trim() : '',
                explanation: row[3] ? row[3].trim() : ''
            })).filter(item => item.romaji !== '' || item.japanese !== '');

            allData.sort((a, b) => a.japanese.localeCompare(b.japanese, 'ja'));

            initSidebar();
            renderTable(allData);
        }
    });

    function initSidebar() {
        const container = document.getElementById('letterContainer');
        katakanaList.forEach(char => {
            let btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.innerText = char;
            btn.onclick = () => filterByLetter(char, btn);
            container.appendChild(btn);
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach(item => {
            let formattedTurkish = item.turkish.replace(/(\(\d+\))/g, '<br><span style="color:var(--accent-color); font-weight:bold;">$1</span>').replace(/^<br>/, '');
            let formattedExp = item.explanation.replace(/(\(\d+\))/g, '<br><span style="color:var(--accent-color);">$1</span>').replace(/^<br>/, '');

            tbody.innerHTML += `
                <tr>
                    <td style="font-size: 1.1em; font-weight: bold; white-space: nowrap;">${item.japanese}</td>
                    <td style="color: #aaa;">${item.romaji}</td>
                    <td>${formattedTurkish}</td>
                    <td style="font-size: 0.85em; color: #bbb;">${formattedExp}</td>
                </tr>`;
        });
    }

    function filterByLetter(letter, btnElement = null) {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');
        else document.querySelector('.full-list-btn').classList.add('active');

        document.getElementById('searchInput').value = '';

        if (letter === 'Hepsi') {
            renderTable(allData);
        } else {
            let filtered = allData.filter(item => getCleanFirstChar(item.japanese) === letter);
            renderTable(filtered);
        }
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        const term = this.value.toLowerCase();
        let filtered = allData.filter(item => 
            item.japanese.toLowerCase().includes(term) ||
            item.romaji.toLowerCase().includes(term) ||
            item.turkish.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });
</script>
</body>
</html>
